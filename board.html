<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Live Attendance Board</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }
    body {
      font-family: 'Inter', sans-serif;
      background: #0f172a;
      color: white;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ── Header ── */
    .header {
      background: linear-gradient(135deg, #1b5e20 0%, #2e7d32 50%, #00796b 100%);
      padding: 28px 40px 24px;
      text-align: center;
    }
    .school-name { font-size: 18px; font-weight: 600; opacity: 0.9; margin-bottom: 4px; }
    .event-name  { font-size: 28px; font-weight: 800; letter-spacing: -0.5px; }
    .event-meta  { display: flex; justify-content: center; gap: 24px; margin-top: 10px; flex-wrap: wrap; }
    .meta-chip {
      background: rgba(255,255,255,0.15); border-radius: 20px;
      padding: 5px 14px; font-size: 14px; font-weight: 500;
    }

    /* ── Main grid ── */
    .main { flex: 1; display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 24px; padding: 32px 40px; align-content: center; }

    .stat-card {
      background: #1e293b;
      border-radius: 20px;
      padding: 36px 32px;
      text-align: center;
      border: 1px solid #334155;
      transition: transform 0.2s;
    }
    .stat-card.highlight { background: #14532d; border-color: #16a34a; }
    .stat-label { font-size: 13px; font-weight: 600; text-transform: uppercase; letter-spacing: 1px; color: #94a3b8; margin-bottom: 12px; }
    .stat-num {
      font-size: 88px; font-weight: 900; line-height: 1;
      letter-spacing: -4px; color: white;
    }
    .stat-card.highlight .stat-num { color: #4ade80; }
    .stat-sub { font-size: 14px; color: #64748b; margin-top: 8px; font-weight: 500; }

    /* ── Progress bar ── */
    .progress-wrap { padding: 0 40px 32px; }
    .progress-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
    .progress-label { font-size: 14px; font-weight: 600; color: #94a3b8; text-transform: uppercase; letter-spacing: 0.5px; }
    .progress-pct   { font-size: 22px; font-weight: 800; color: #4ade80; }
    .progress-bar-bg {
      background: #1e293b; border-radius: 999px; height: 20px; overflow: hidden;
      border: 1px solid #334155;
    }
    .progress-bar-fill {
      height: 100%; border-radius: 999px;
      background: linear-gradient(90deg, #16a34a, #4ade80);
      transition: width 0.8s ease;
    }

    /* ── Footer ── */
    .footer {
      padding: 16px 40px;
      display: flex; justify-content: space-between; align-items: center;
      border-top: 1px solid #1e293b;
    }
    .footer-brand { font-size: 13px; color: #475569; font-weight: 500; }
    .pulse-wrap { display: flex; align-items: center; gap: 8px; font-size: 13px; color: #475569; }
    .pulse {
      width: 8px; height: 8px; border-radius: 50%; background: #4ade80;
      animation: pulse 2s infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.5; transform: scale(0.8); }
    }

    /* ── Loading / error ── */
    .center-msg {
      flex: 1; display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 16px;
      color: #64748b;
    }
    .center-msg .icon { font-size: 48px; }
    .center-msg p { font-size: 16px; }

    @media (max-width: 700px) {
      .main { grid-template-columns: 1fr; padding: 20px; }
      .stat-num { font-size: 64px; }
      .header { padding: 20px; }
      .event-name { font-size: 22px; }
      .progress-wrap, .footer { padding-left: 20px; padding-right: 20px; }
    }
  </style>
</head>
<body>

<div id="loading" class="center-msg">
  <div class="icon">📋</div>
  <p>Loading event data…</p>
</div>

<div id="board" style="display:none;flex-direction:column;height:100vh">
  <div class="header">
    <div class="school-name" id="b-school"></div>
    <div class="event-name"  id="b-event"></div>
    <div class="event-meta">
      <div class="meta-chip" id="b-date"></div>
      <div class="meta-chip" id="b-time"></div>
      <div class="meta-chip" id="b-venue"></div>
    </div>
  </div>

  <div class="main">
    <div class="stat-card">
      <div class="stat-label">Registered</div>
      <div class="stat-num" id="b-registered">—</div>
      <div class="stat-sub" id="b-capacity-sub"></div>
    </div>
    <div class="stat-card highlight">
      <div class="stat-label">Attended</div>
      <div class="stat-num" id="b-attended">—</div>
      <div class="stat-sub">checked in today</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Remaining</div>
      <div class="stat-num" id="b-remaining">—</div>
      <div class="stat-sub">yet to arrive</div>
    </div>
  </div>

  <div class="progress-wrap">
    <div class="progress-header">
      <span class="progress-label">Attendance Rate</span>
      <span class="progress-pct" id="b-pct">0%</span>
    </div>
    <div class="progress-bar-bg">
      <div class="progress-bar-fill" id="b-bar" style="width:0%"></div>
    </div>
  </div>

  <div class="footer">
    <span class="footer-brand">Powered by SmartFlowHK</span>
    <div class="pulse-wrap"><div class="pulse"></div><span id="b-updated">Updating…</span></div>
  </div>
</div>

<div id="error" class="center-msg" style="display:none">
  <div class="icon">⚠️</div>
  <p id="error-msg">Event not found.</p>
</div>

<script>
const N8N = 'https://n8n.okahh.com';
const params = new URLSearchParams(location.search);
const eventId = params.get('event') || params.get('event_id') || '';

if (!eventId) {
  document.getElementById('loading').style.display = 'none';
  document.getElementById('error').style.display = 'flex';
  document.getElementById('error-msg').textContent = 'No event ID in URL. Add ?event=EVENT_ID';
}

async function fetchStats() {
  try {
    const res = await fetch(`${N8N}/webhook/openday-live-stats?event_id=${encodeURIComponent(eventId)}`);
    const d = await res.json();
    if (!d.success) {
      document.getElementById('loading').style.display = 'none';
      document.getElementById('error').style.display = 'flex';
      document.getElementById('error-msg').textContent = d.message || 'Event not found.';
      return;
    }
    render(d);
  } catch(e) {
    if (document.getElementById('board').style.display === 'none') {
      document.getElementById('loading').style.display = 'none';
      document.getElementById('error').style.display = 'flex';
      document.getElementById('error-msg').textContent = 'Could not reach server.';
    }
  }
}

function render(d) {
  document.getElementById('loading').style.display = 'none';
  document.getElementById('error').style.display = 'none';
  const board = document.getElementById('board');
  board.style.display = 'flex';

  document.getElementById('b-school').textContent = d.school_name || '';
  document.getElementById('b-event').textContent  = d.event_name  || '';
  document.getElementById('b-date').textContent   = d.event_date  || '';
  document.getElementById('b-time').textContent   = d.event_time  || '';
  document.getElementById('b-venue').textContent  = d.venue       || '';

  const registered = parseInt(d.registered) || 0;
  const attended   = parseInt(d.attended)   || 0;
  const capacity   = parseInt(d.capacity)   || 0;
  const remaining  = Math.max(0, registered - attended);
  const pct        = registered > 0 ? Math.round((attended / registered) * 100) : 0;

  document.getElementById('b-registered').textContent = registered;
  document.getElementById('b-attended').textContent   = attended;
  document.getElementById('b-remaining').textContent  = remaining;
  document.getElementById('b-capacity-sub').textContent = capacity > 0 ? `of ${capacity} capacity` : 'total registrations';
  document.getElementById('b-pct').textContent  = pct + '%';
  document.getElementById('b-bar').style.width  = pct + '%';

  const now = new Date();
  document.getElementById('b-updated').textContent = `Live · updated ${now.getHours().toString().padStart(2,'0')}:${now.getMinutes().toString().padStart(2,'0')}:${now.getSeconds().toString().padStart(2,'0')}`;
}

if (eventId) {
  fetchStats();
  setInterval(fetchStats, 5000);
}
</script>
</body>
</html>
